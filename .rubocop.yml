# Omakase Ruby styling for Rails [https://github.com/rails/rubocop-rails-omakase]
inherit_gem:
  rubocop-rails-omakase: rubocop.yml

# Lint the Minitest suite (omakase does not load this plugin).
plugins:
  - rubocop-minitest

# Our characterization tests deliberately group several boundary asserts per
# test; do not force them apart.
Minitest/MultipleAssertions:
  Enabled: false

# Phase 7 broad rollout: omakase disables whole departments and re-enables a
# hand-picked subset. We turn the departments back on one at a time, fixing
# their offenses per step. Performance/Security are clean; Lint/Naming had a
# handful of findings, all fixed.
Performance:
  Enabled: true
Security:
  Enabled: true
Lint:
  Enabled: true
Naming:
  Enabled: true

# Enabled in Phase 0.5 before the Rails department comes on (step 3); kept
# explicit so the zone-aware call sites stay enforced in the meantime.
Rails/Date:
  Enabled: true
Rails/TimeZone:
  Enabled: true

# Overrides can be added below; keep this minimal.
AllCops:
  # Activate newly released cops in enabled departments (omakase keeps most
  # departments off, so in practice this opts the Minitest cops in).
  NewCops: enable
  Exclude:
    - "db/schema.rb"
    - "bin/**/*"
    - "vendor/**/*"
