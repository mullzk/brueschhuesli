---
# Vendored gems install into vendor/bundle in CI; don't lint their templates.
exclude:
  - "vendor/**/*"
  - "bin/**/*"
  - "node_modules/**/*"

# ERB linting. The default linters (formatting, ErbSafety, void tags, input
# autocomplete, indentation) are on. The Rubocop linter runs RuboCop on the
# Ruby inside ERB, inheriting the project config; cops that make no sense on
# extracted view fragments are switched off below.
linters:
  Rubocop:
    enabled: true
    rubocop_config:
      inherit_from:
        - .rubocop.yml
      Style/FrozenStringLiteralComment:
        Enabled: false
      Layout/LineLength:
        Enabled: false
      Layout/InitialIndentation:
        Enabled: false
      Layout/TrailingEmptyLines:
        Enabled: false
      Layout/TrailingWhitespace:
        Enabled: false
      Lint/UselessAssignment:
        Enabled: false
